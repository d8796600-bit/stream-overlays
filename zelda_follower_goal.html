<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follower Goal - Zelda/Mario</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cinzel', serif;
    overflow: hidden;
  }

  /* ===================== SELECTOR DE TEMA ===================== */
  .mode-selector {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
    z-index: 999;
  }
  .mode-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    font-weight: bold;
    transition: all 0.3s;
    font-family: 'Cinzel', serif;
  }
  .mode-btn.zelda  { background: #6b3fa0; color: #ffe0ff; }
  .mode-btn.mario  { background: #c0392b; color: #fff; }
  .mode-btn.triforce { background: #b8860b; color: #fff9e6; }
  .mode-btn.active { transform: scale(1.15); box-shadow: 0 0 14px rgba(255,255,255,0.4); }

  /* ===================== CONTENEDOR ===================== */
  .goal-wrap {
    width: 460px;
    padding: 20px 24px 16px;
    border-radius: 18px;
    position: relative;
    animation: fadeIn 0.8s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* Partículas de fondo decorativas */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 18px;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: drift linear infinite;
    opacity: 0;
  }
  @keyframes drift {
    0%   { opacity:0; transform: translateY(100%) scale(0); }
    20%  { opacity:0.6; }
    80%  { opacity:0.4; }
    100% { opacity:0; transform: translateY(-20px) scale(1.5); }
  }

  /* ---- Encabezado con icono grande ---- */
  .goal-hero {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }
  .hero-icon {
    font-size: 42px;
    line-height: 1;
    filter: drop-shadow(0 0 10px currentColor);
    animation: heroFloat 3.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes heroFloat {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-6px) rotate(3deg); }
  }
  .hero-text { flex: 1; }
  .hero-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 3px;
  }
  .hero-count {
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -1px;
  }
  .hero-count span {
    font-size: 15px;
    font-weight: 400;
    opacity: 0.6;
    margin-left: 4px;
    letter-spacing: 1px;
  }
  .hero-goal-text {
    font-size: 11px;
    opacity: 0.55;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ---- Barra de progreso PRINCIPAL (espada/orb) ---- */
  .bar-section { margin-bottom: 10px; }

  .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 1.5px;
    opacity: 0.6;
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .bar-track {
    width: 100%;
    height: 28px;
    border-radius: 40px;
    position: relative;
    overflow: hidden;
    border: 2px solid;
  }

  /* Brillo de fondo en la pista */
  .bar-track::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 0;
  }

  .bar-fill {
    height: 100%;
    border-radius: 40px;
    position: relative;
    z-index: 1;
    transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 8px;
  }

  /* Brillo superior */
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 3px; left: 8px; right: 8px;
    height: 7px;
    border-radius: 10px;
    background: rgba(255,255,255,0.3);
  }

  /* Punta brillante del relleno */
  .bar-tip {
    font-size: 16px;
    z-index: 2;
    filter: drop-shadow(0 0 6px white);
    animation: tipPulse 1s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes tipPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

  /* Texto de porcentaje dentro de la barra */
  .bar-pct-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    z-index: 3;
    mix-blend-mode: overlay;
    color: white;
  }

  /* ---- Mini segmentos de hitos ---- */
  .milestones {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    gap: 6px;
  }
  .milestone {
    flex: 1;
    text-align: center;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 0;
    border-radius: 6px;
    border: 1px solid;
    opacity: 0.45;
    transition: all 0.5s;
    text-transform: uppercase;
  }
  .milestone.reached {
    opacity: 1;
    transform: scale(1.05);
  }
  .milestone-icon { display: block; font-size: 14px; margin-bottom: 1px; }

  /* ---- Mensaje motivacional ---- */
  .goal-message {
    text-align: center;
    font-size: 11px;
    margin-top: 10px;
    letter-spacing: 1px;
    font-style: italic;
    opacity: 0.8;
    animation: msgPulse 4s ease-in-out infinite;
  }
  @keyframes msgPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* ---- Banner de completado ---- */
  .complete-banner {
    display: none;
    text-align: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    font-weight: 900;
    margin-top: 8px;
    letter-spacing: 2px;
    animation: celebrate 0.6s ease-in-out infinite alternate;
  }
  @keyframes celebrate { from{transform:scale(1)} to{transform:scale(1.05)} }
  .complete-banner.show { display: block; }

  /* ============================================================
     TEMA 1 — ZELDA: GUERREROS DEL TIEMPO (Morado/Dorado)
  ============================================================ */
  body.theme-zelda .goal-wrap {
    background: linear-gradient(145deg, #150a25 0%, #0a0515 50%, #1a0a30 100%);
    border: 2px solid #7c3fa0;
    box-shadow: 0 0 40px rgba(124,63,160,0.35), inset 0 0 30px rgba(0,0,0,0.4);
  }
  body.theme-zelda .hero-icon    { color: #ffe066; }
  body.theme-zelda .hero-title   { color: #c77dff; }
  body.theme-zelda .hero-count   { color: #ffe066; text-shadow: 0 0 20px rgba(255,224,102,0.6); }
  body.theme-zelda .hero-goal-text { color: #c77dff; }
  body.theme-zelda .bar-label    { color: #c77dff; }
  body.theme-zelda .bar-track    { border-color: #7c3fa0; box-shadow: 0 0 16px rgba(124,63,160,0.5); }
  body.theme-zelda .bar-fill     {
    background: linear-gradient(90deg, #4a1a80, #7c3fa0, #c77dff, #ffe066, #c77dff);
    background-size: 250% 100%;
    animation: zeldaFlow 3s linear infinite;
  }
  @keyframes zeldaFlow { 0%{background-position:0%} 100%{background-position:250%} }
  body.theme-zelda .milestone    { border-color: #7c3fa0; color: #c77dff; }
  body.theme-zelda .milestone.reached { background: rgba(124,63,160,0.3); color: #ffe066; border-color: #ffe066; }
  body.theme-zelda .goal-message { color: #c77dff; }
  body.theme-zelda .complete-banner { color: #ffe066; text-shadow: 0 0 20px rgba(255,224,102,0.8); }
  body.theme-zelda .particle     { background: rgba(199,125,255,0.6); }

  /* ============================================================
     TEMA 2 — MARIO: MUNDO DE ESTRELLAS (Rojo/Dorado)
  ============================================================ */
  body.theme-mario .goal-wrap {
    background: linear-gradient(145deg, #1a0500 0%, #0d0300 50%, #200800 100%);
    border: 2px solid #c0392b;
    box-shadow: 0 0 40px rgba(192,57,43,0.35), inset 0 0 30px rgba(0,0,0,0.4);
  }
  body.theme-mario .hero-icon    { color: #f39c12; }
  body.theme-mario .hero-title   { color: #e74c3c; }
  body.theme-mario .hero-count   { color: #f39c12; text-shadow: 0 0 20px rgba(243,156,18,0.6); }
  body.theme-mario .hero-goal-text { color: #e74c3c; }
  body.theme-mario .bar-label    { color: #e74c3c; }
  body.theme-mario .bar-track    { border-color: #c0392b; box-shadow: 0 0 16px rgba(192,57,43,0.5); }
  body.theme-mario .bar-fill     {
    background: linear-gradient(90deg, #922b21, #c0392b, #e74c3c, #f39c12, #e74c3c);
    background-size: 250% 100%;
    animation: marioFlow 2.5s linear infinite;
  }
  @keyframes marioFlow { 0%{background-position:0%} 100%{background-position:250%} }
  body.theme-mario .milestone    { border-color: #c0392b; color: #e74c3c; }
  body.theme-mario .milestone.reached { background: rgba(192,57,43,0.3); color: #f39c12; border-color: #f39c12; }
  body.theme-mario .goal-message { color: #e74c3c; }
  body.theme-mario .complete-banner { color: #f39c12; text-shadow: 0 0 20px rgba(243,156,18,0.8); }
  body.theme-mario .particle     { background: rgba(243,156,18,0.6); }

  /* ============================================================
     TEMA 3 — TRIFORCE: PODER LEGENDARIO (Dorado puro)
  ============================================================ */
  body.theme-triforce .goal-wrap {
    background: linear-gradient(145deg, #1a1200 0%, #0d0900 50%, #1f1600 100%);
    border: 2px solid #b8860b;
    box-shadow: 0 0 40px rgba(184,134,11,0.4), inset 0 0 30px rgba(0,0,0,0.4);
  }
  body.theme-triforce .hero-icon    { color: #ffd700; }
  body.theme-triforce .hero-title   { color: #daa520; }
  body.theme-triforce .hero-count   { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.7); }
  body.theme-triforce .hero-goal-text { color: #daa520; }
  body.theme-triforce .bar-label    { color: #daa520; }
  body.theme-triforce .bar-track    { border-color: #b8860b; box-shadow: 0 0 16px rgba(184,134,11,0.5); }
  body.theme-triforce .bar-fill     {
    background: linear-gradient(90deg, #7d6008, #b8860b, #daa520, #ffd700, #fff9c4, #ffd700);
    background-size: 250% 100%;
    animation: triFlow 2s linear infinite;
  }
  @keyframes triFlow { 0%{background-position:0%} 100%{background-position:250%} }
  body.theme-triforce .milestone    { border-color: #b8860b; color: #daa520; }
  body.theme-triforce .milestone.reached { background: rgba(184,134,11,0.3); color: #ffd700; border-color: #ffd700; }
  body.theme-triforce .goal-message { color: #daa520; }
  body.theme-triforce .complete-banner { color: #ffd700; text-shadow: 0 0 25px rgba(255,215,0,0.9); }
  body.theme-triforce .particle     { background: rgba(255,215,0,0.6); }
</style>
</head>
<body class="theme-zelda">

<!-- Selector de tema -->
<div class="mode-selector">
  <button class="mode-btn zelda active"    onclick="setTheme('zelda')">🗡️ Zelda</button>
  <button class="mode-btn mario"           onclick="setTheme('mario')">⭐ Mario</button>
  <button class="mode-btn triforce"        onclick="setTheme('triforce')">🔺 Triforce</button>
</div>

<!-- ===== WIDGET PRINCIPAL ===== -->
<div class="goal-wrap" id="goalWrap">

  <!-- Partículas de fondo -->
  <div class="particles" id="particles"></div>

  <!-- Encabezado hero -->
  <div class="goal-hero">
    <div class="hero-icon" id="heroIcon">⚔️</div>
    <div class="hero-text">
      <div class="hero-title" id="heroTitle">Guerreros del Tiempo</div>
      <div class="hero-count" id="heroCount">
        2,847 <span>seguidores</span>
      </div>
      <div class="hero-goal-text" id="heroGoalText">Meta: 3,000 guerreros</div>
    </div>
  </div>

  <!-- Barra de progreso -->
  <div class="bar-section">
    <div class="bar-label">
      <span id="barLabelLeft">⚔️ progreso</span>
      <span id="barLabelRight">faltan <strong id="remaining">153</strong></span>
    </div>
    <div class="bar-track" id="barTrack">
      <div class="bar-fill" id="barFill" style="width:0%">
        <span class="bar-tip" id="barTip">🗡️</span>
      </div>
      <div class="bar-pct-text" id="barPct">0%</div>
    </div>
  </div>

  <!-- Hitos / milestones -->
  <div class="milestones" id="milestones"></div>

  <!-- Mensaje motivacional -->
  <div class="goal-message" id="goalMessage">
    ⚔️ ¡Únete al ejército del tiempo! Cada seguidor nos acerca a la victoria 🌙
  </div>

  <!-- Banner de completado -->
  <div class="complete-banner" id="completeBanner">
    🏆 ¡META ALCANZADA! ¡GRACIAS GUERREROS! 🏆
  </div>

</div>

<script>
  /* ================================================================
     CONFIGURACIÓN — EDITA AQUÍ
  ================================================================ */
  const CFG = {
    theme:   'zelda',      // 'zelda' | 'mario' | 'triforce'
    current: 2847,         // ← TU NÚMERO ACTUAL DE SEGUIDORES
    goal:    3000,         // ← TU META DE SEGUIDORES

    themes: {
      zelda: {
        icon:        '⚔️',
        title:       'Guerreros del Tiempo',
        goalLabel:   'Meta: {GOAL} guerreros',
        tipIcon:     '🗡️',
        message:     '⚔️ ¡Únete al ejército del tiempo! Cada seguidor nos acerca a la victoria 🌙',
        complete:    '🏆 ¡Ejército completo! ¡Gracias guerreros! ⚔️',
        milestones:  [
          { pct: 25,  icon: '🌱', label: 'Aprendiz' },
          { pct: 50,  icon: '⚔️', label: 'Héroe'    },
          { pct: 75,  icon: '🛡️', label: 'Guardián' },
          { pct: 100, icon: '👑', label: 'Leyenda'  },
        ]
      },
      mario: {
        icon:        '🍄',
        title:       'Mundo de las Estrellas',
        goalLabel:   'Meta: {GOAL} jugadores',
        tipIcon:     '⭐',
        message:     '🍄 ¡Ayuda a Mario a llegar al siguiente mundo! ¡Sigue el canal! ⭐',
        complete:    '🌟 ¡Mundo desbloqueado! ¡Gracias a todos! 🎉',
        milestones:  [
          { pct: 25,  icon: '🍄', label: 'Mundo 1' },
          { pct: 50,  icon: '🌺', label: 'Mundo 2' },
          { pct: 75,  icon: '❄️', label: 'Mundo 3' },
          { pct: 100, icon: '⭐', label: 'Castillo'},
        ]
      },
      triforce: {
        icon:        '🔺',
        title:       'Poder de la Trifuerza',
        goalLabel:   'Meta: {GOAL} héroes',
        tipIcon:     '✨',
        message:     '🔺 ¡Cada seguidor fortalece la Trifuerza! ¡Únete héroe! ✨',
        complete:    '✨ ¡La Trifuerza está completa! ¡Gracias héroes! 🔺',
        milestones:  [
          { pct: 25,  icon: '💪', label: 'Poder'    },
          { pct: 50,  icon: '🧠', label: 'Sabiduría'},
          { pct: 75,  icon: '❤️', label: 'Coraje'   },
          { pct: 100, icon: '🔺', label: 'Trifuerza'},
        ]
      }
    }
  };
  /* ================================================================ */

  function fmt(n) {
    return n >= 1000 ? (n/1000).toFixed(1).replace('.0','') + 'K' : n;
  }

  function buildParticles(theme) {
    const container = document.getElementById('particles');
    container.innerHTML = '';
    const colors = { zelda:'rgba(199,125,255,', mario:'rgba(243,156,18,', triforce:'rgba(255,215,0,' };
    const col = colors[theme] || colors.zelda;
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 3 + Math.random() * 6;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        bottom:0;
        animation-duration:${4 + Math.random()*6}s;
        animation-delay:${Math.random()*5}s;
        background:${col}${0.4 + Math.random()*0.4});
      `;
      container.appendChild(p);
    }
  }

  function buildMilestones(theme, pct) {
    const t = CFG.themes[theme];
    const container = document.getElementById('milestones');
    container.innerHTML = '';
    t.milestones.forEach(m => {
      const div = document.createElement('div');
      div.className = 'milestone' + (pct >= m.pct ? ' reached' : '');
      div.innerHTML = `<span class="milestone-icon">${m.icon}</span>${m.label}`;
      container.appendChild(div);
    });
  }

  function setTheme(theme) {
    CFG.theme = theme;
    document.body.className = 'theme-' + theme;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.mode-btn.' + theme).classList.add('active');
    buildParticles(theme);
    updateBar(CFG.current, CFG.goal, theme);
  }

  function updateBar(current, goal, theme) {
    theme = theme || CFG.theme;
    const t   = CFG.themes[theme];
    const pct = Math.min(100, Math.round((current / goal) * 100));
    const rem = Math.max(0, goal - current);

    document.getElementById('heroIcon').textContent    = t.icon;
    document.getElementById('heroTitle').textContent   = t.title;
    document.getElementById('heroCount').innerHTML     = `${fmt(current)} <span>seguidores</span>`;
    document.getElementById('heroGoalText').textContent= t.goalLabel.replace('{GOAL}', fmt(goal));
    document.getElementById('barTip').textContent      = t.tipIcon;
    document.getElementById('goalMessage').textContent = t.message;
    document.getElementById('completeBanner').textContent = t.complete;
    document.getElementById('remaining').textContent   = fmt(rem);
    document.getElementById('barPct').textContent      = pct + '%';

    // Animar barra
    setTimeout(() => {
      document.getElementById('barFill').style.width = pct + '%';
    }, 100);

    // Hitos
    buildMilestones(theme, pct);

    // Completado
    const banner = document.getElementById('completeBanner');
    if (pct >= 100) {
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }
  }

  // ---- Arranque ----
  setTheme(CFG.theme);

  // ---- Conexión con Tikfinity (activar cuando tengas API) ----
  /*
  async function fetchFollowers() {
    try {
      const res  = await fetch('https://tikfinity.zerody.one/api/v1/goal/YOUR_GOAL_ID', {
        headers: { 'Authorization': 'Bearer YOUR_API_KEY' }
      });
      const data = await res.json();
      CFG.current = data.current;
      CFG.goal    = data.target;
      updateBar(CFG.current, CFG.goal);
    } catch(e) { console.warn('Tikfinity error', e); }
  }
  fetchFollowers();
  setInterval(fetchFollowers, 15000);
  */
</script>
</body>
</html>
